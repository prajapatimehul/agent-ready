services:
  pet-api:
    build:
      context: ./examples/petstore
      dockerfile: Dockerfile
    container_name: agent-ready-pet-api
    ports:
      - "4010:4010"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4010/pets').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 3s
      timeout: 3s
      retries: 20
